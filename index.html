  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

eholder=\"123456:ABC...\" style=\"width:100%; background:#0d1017; border:1px solid #262d3a; color:#e7eaf0; padding:11px 13px; border-radius:11px; font-size:13px; font-family:'Space Grotesk',monospace;\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"font-size:12px; color:#8b93a3; display:block; margin-bottom:6px;\">Chat ID<\u002Flabel>\n            <div style=\"display:flex; gap:8px;\">\n              <input value=\"{{ tgChat }}\" onchange=\"{{ setTgChat }}\" placeholder=\"เช่น 812345678\" style=\"flex:1; background:#0d1017; border:1px solid #262d3a; color:#e7eaf0; padding:11px 13px; border-radius:11px; font-size:13px; font-family:'Space Grotesk',monospace;\">\n              <button onclick=\"{{ fetchChatId }}\" style=\"white-space:nowrap; background:#1a2130; color:#c4b8ff; border:1px solid #2c3446; padding:0 15px; border-radius:11px; font-size:13px; font-weight:600; cursor:pointer;\">ดึงอัตโนมัติ<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"font-size:11.5px; color:#6b7484; margin-top:6px; line-height:1.5;\">วิธีดึง: เปิด Telegram → ทักบอทของคุณ พิมพ์อะไรก็ได้ (เช่น /start) → กลับมากด “ดึงอัตโนมัติ”<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:10px; margin-top:4px;\">\n            <button onclick=\"{{ saveSettings }}\" style=\"flex:1; background:linear-gradient(135deg,#7c5cff,#a45cff); color:#fff; border:none; padding:12px; border-radius:12px; font-weight:600; font-size:14px; cursor:pointer;\">บันทึก<\u002Fbutton>\n            <button onclick=\"{{ testTg }}\" style=\"flex:1; background:#12321f; color:#4ee39a; border:1px solid #1e5c3a; padding:12px; border-radius:12px; font-weight:600; font-size:14px; cursor:pointer;\">ส่งข้อความทดสอบ<\u002Fbutton>\n          <\u002Fdiv>\n\n          <!-- MINI APP SETUP -->\n          <div style=\"border-top:1px solid #1e2530; margin-top:6px; padding-top:18px;\">\n            <div style=\"font-size:14.5px; font-weight:700; display:flex; align-items:center; gap:8px; margin-bottom:4px;\">📲 ปุ่มเมนูใส่ออเดอร์ (Mini App)<\u002Fdiv>\n            <div style=\"font-size:12.5px; color:#8b93a3; margin-bottom:14px; line-height:1.6;\">ตั้งปุ่มในบอท พอกดที่ไอคอนเมนูในแชต จะเด้งฟอร์มใส่ออเดอร์ขึ้นมา — พิมพ์ แพลตฟอร์ม/บริการ/ลิ้ง/ยอด/ราคา ได้เลยจากมือถือ<\u002Fdiv>\n\n            <div style=\"display:flex; flex-direction:column; gap:12px;\">\n              <div style=\"display:flex; gap:11px;\">\n                <span style=\"flex-shrink:0; width:24px; height:24px; border-radius:50%; background:#221a3d; color:#c4b8ff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; font-family:'Space Grotesk',sans-serif;\">1<\u002Fspan>\n                <div style=\"font-size:12.5px; color:#c3cad6; line-height:1.55;\">เอาลิ้งหน้าฟอร์ม <b style=\"color:#e7eaf0;\">Telegram Order<\u002Fb> (ไฟล์นี้เมื่อเผยแพร่ออนไลน์) มาเป็น URL ของ Mini App<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:11px;\">\n                <span style=\"flex-shrink:0; width:24px; height:24px; border-radius:50%; background:#221a3d; color:#c4b8ff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; font-family:'Space Grotesk',sans-serif;\">2<\u002Fspan>\n                <div style=\"font-size:12.5px; color:#c3cad6; line-height:1.55;\">เปิด <b style=\"color:#e7eaf0;\">@BotFather<\u002Fb> → <code style=\"background:#0d1017; border:1px solid #232a36; padding:1px 6px; border-radius:6px; font-size:11.5px; color:#c4b8ff;\">/setmenubutton<\u002Fcode> → เลือกบอท → วาง URL → ตั้งชื่อปุ่ม เช่น “＋ ใส่ออเดอร์”<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:11px;\">\n                <span style=\"flex-shrink:0; width:24px; height:24px; border-radius:50%; background:#12321f; color:#4ee39a; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; font-family:'Space Grotesk',sans-serif;\">✓<\u002Fspan>\n                <div style=\"font-size:12.5px; color:#c3cad6; line-height:1.55;\">เสร็จ! ในแชต จะมีปุ่มเมนูอยู่ข้างช่องพิมพ์ กดแล้วฟอร์มเด้งขึ้น กรอกเสร็จออเดอร์เข้าระบบทันที<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; align-items:center; gap:8px; background:#0d1017; border:1px solid #232a36; border-radius:11px; padding:10px 13px; margin-top:14px;\">\n              <span style=\"font-size:11.5px; color:#6b7484; flex-shrink:0;\">URL ฟอร์ม<\u002Fspan>\n              <code style=\"flex:1; min-width:0; font-size:12px; color:#c4b8ff; font-family:'Space Grotesk',monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ miniAppUrl }}<\u002Fcode>\n              <button onclick=\"{{ copyMiniUrl }}\" style=\"flex-shrink:0; background:#1a2130; color:#c4b8ff; border:1px solid #2c3446; padding:6px 12px; border-radius:9px; font-size:12px; font-weight:600; cursor:pointer;\">{{ copyLabel }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ tgMsgShow }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:12.5px; padding:11px 13px; border-radius:11px; background:{{ tgMsgBg }}; color:{{ tgMsgColor }}; line-height:1.5;\">{{ tgMsg }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== ADD ORDER MODAL ===== -->\n  <sc-if value=\"{{ showForm }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeForm }}\" style=\"position:fixed; inset:0; background:rgba(5,6,10,.7); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:50; padding:16px;\">\n      <div onclick=\"{{ stop }}\" style=\"width:480px; max-width:92vw; max-height:88vh; overflow-y:auto; background:#12161e; border:1px solid #262d3a; border-radius:20px; padding:26px; box-shadow:0 30px 80px -20px rgba(0,0,0,.8);\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;\">\n          <div style=\"font-size:18px; font-weight:700;\">เพิ่มออเดอร์ใหม่<\u002Fdiv>\n          <button onclick=\"{{ closeForm }}\" style=\"background:none; border:none; color:#6b7484; font-size:20px; cursor:pointer;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:14px;\">\n          <div>\n            <label style=\"font-size:12px; color:#8b93a3; display:block; margin-bottom:6px;\">ชื่อลูกค้า<\u002Flabel>\n            <input value=\"{{ form.customer }}\" onchange=\"{{ setCustomer }}\" placeholder=\"เช่น คุณเบล / ร้านกาแฟหอม\" style=\"width:100%; background:#0d1017; border:1px solid #262d3a; color:#e7eaf0; padding:11px 13px; border-radius:11px; font-size:14px;\">\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px;\">\n            <div>\n              <label style=\"font-size:12px; color:#8b93a3; display:block; margin-bottom:6px;\">แพลตฟอร์ม<\u002Flabel>\n              <sc-raw-select value=\"{{ form.platform }}\" onchange=\"{{ setPlatform }}\" style=\"width:100%; background:#0d1017; border:1px solid #262d3a; color:#e7eaf0; padding:11px 13px; border-radius:11px; font-size:14px;\">\n                <sc-for list=\"{{ platformOpts }}\" as=\"p\" hint-placeholder-count=\"4\"><option value=\"{{ p }}\">{{ p }}<\u002Foption><\u002Fsc-for>\n              <\u002Fsc-raw-select>\n            <\u002Fdiv>\n            <div>\n              <label style=\"font-size:12px; color:#8b93a3; display:block; margin-bottom:6px;\">บริการ<\u002Flabel>\n              <sc-raw-select value=\"{{ form.service }}\" onchange=\"{{ setService }}\" style=\"width:100%; background:#0d1017; border:1px solid #262d3a; color:#e7eaf0; padding:11px 13px; border-radius:11px; font-size:14px;\">\n                <sc-for list=\"{{ serviceOpts }}\" as=\"s\" hint-placeholder-count=\"4\"><option value=\"{{ s }}\">{{ s }}<\u002Foption><\u002Fsc-for>\n              <\u002Fsc-raw-select>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <label style=\"font-size:12px; color:#8b93a3; display:block; margin-bottom:6px;\">ประเภทแอคเค้า<\u002Flabel>\n            <div style=\"display:flex; gap:8px;\">\n              <sc-for list=\"{{ accountTypeOpts }}\" as=\"a\" hint-placeholder-count=\"2\">\n                <button onclick=\"{{ a.onClick }}\" style=\"{{ a.style }}\"><span style=\"font-size:14px;\">{{ a.icon }}<\u002Fspan> {{ a.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <label style=\"font-size:12px; color:#8b93a3; display:block; margin-bottom:6px;\">ลิ้งเป้าหมาย (โพส/โปรไฟล์)<\u002Flabel>\n            <input value=\"{{ form.link }}\" onchange=\"{{ setLink }}\" placeholder=\"https://...\" style=\"width:100%; background:#0d1017; border:1px solid #262d3a; color:#e7eaf0; padding:11px 13px; border-radius:11px; font-size:14px;\">\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px;\">\n            <div>\n              <label style=\"font-size:12px; color:#8b93a3; display:block; margin-bottom:6px;\">จำนวนที่สั่ง (ยอด)<\u002Flabel>\n              <input value=\"{{ form.qty }}\" onchange=\"{{ setQty }}\" type=\"number\" placeholder=\"1000\" style=\"width:100%; background:#0d1017; border:1px solid #262d3a; color:#e7eaf0; padding:11px 13px; border-radius:11px; font-size:14px;\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"font-size:12px; color:#8b93a3; display:block; margin-bottom:6px;\">ราคา (บาท)<\u002Flabel>\n              <input value=\"{{ form.price }}\" onchange=\"{{ setPrice }}\" type=\"number\" placeholder=\"150\" style=\"width:100%; background:#0d1017; border:1px solid #262d3a; color:#e7eaf0; padding:11px 13px; border-radius:11px; font-size:14px;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ submit }}\" style=\"margin-top:6px; background:linear-gradient(135deg,#7c5cff,#a45cff); color:#fff; border:none; padding:13px; border-radius:12px; font-weight:600; font-size:15px; cursor:pointer;\">บันทึกออเดอร์<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    page: 'dashboard',\n    filter: 'all',\n    showForm: false,\n    orders: null,\n    form: { customer:'', platform:'Facebook', service:'', link:'', qty:'', price:'', accountType:'ปกติปน' },\n    copiedId: null,\n    showSettings: false,\n    tgToken: '',\n    tgChat: '',\n    tgMsg: '',\n    tgMsgKind: '',\n    chartMode: 'week',\n    monthOffset: 0,\n    rangeFrom: '',\n    rangeTo: '',\n    copied: false,\n    authed: false,\n    user: null,\n    authTab: 'login',\n    authName: '',\n    authPass: '',\n    authPass2: '',\n    authErr: '',\n    authBusy: false,\n    vw: (typeof window!=='undefined' ? window.innerWidth : 1200),\n  };\n  THMONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];\n  THDAYS = ['อา','จ','อ','พ','พฤ','ศ','ส'];\n\n  PLATFORMS = {\n    'Facebook': { color:'#4a8bff', icon:'f' },\n    'Instagram': { color:'#e756a5', icon:'IG' },\n    'TikTok': { color:'#37e6d9', icon:'TT' },\n    'YouTube': { color:'#ff5b5b', icon:'YT' },\n  };\n  SERVICES = {\n    'Facebook': ['เพิ่มผู้ติดตาม','เพิ่มไลค์โพส','ยอดวิว','ยอดแชร์'],\n    'Instagram': ['เพิ่มผู้ติดตาม','เพิ่มไลค์โพส','ยอดวิว','ยอดรีโพส'],\n    'TikTok': ['เพิ่มผู้ติดตาม','เพิ่มไลค์โพส','ยอดวิว','ยอดรีโพส'],\n    'YouTube': ['เพิ่มผู้ติดตาม','เพิ่มไลค์คลิป','ยอดวิว','ยอดแชร์'],\n  };\n  STATUSES = ['รอทำ','ทำแล้ว'];\n  ST_STYLE = {\n    'รอทำ': { bg:'#3a2a12', color:'#ffb04a' },\n    'ทำแล้ว': { bg:'#12321f', color:'#4ee39a' },\n  };\n  migrate(s){ if(this.STATUSES.indexOf(s)>=0) return s; return (s==='เสร็จ')?'ทำแล้ว':'รอทำ'; }\n  AV = ['#7c5cff','#e756a5','#4a8bff','#37c98f','#ff8a4a','#c86bff'];\n\n  // ===== AUTH (per-browser accounts) =====\n  getUsers() { try { return JSON.parse(localStorage.getItem('pumpdesk_users_v1')) || {}; } catch(e){ return {}; } }\n  saveUsers(u) { try { localStorage.setItem('pumpdesk_users_v1', JSON.stringify(u)); } catch(e){} }\n  oKey(u){ return 'pumpdesk_orders_v2_' + u; }\n  tKey(u){ return 'pumpdesk_tg_v1_' + u; }\n\n  // ---- cloud accounts (Firestore) — เก็บบัญชี + รหัส + ตั้งค่า Telegram ไว้บนคลาวด์ ให้ใช้ข้ามเครื่อง/ข้ามเบราว์เซอร์ได้ ----\n  async waitDb(ms){ const t0=Date.now(); while(!this.db && (Date.now()-t0)<(ms||5000)){ this.ensureFirebase(); await new Promise(r=>setTimeout(r,150)); } return this.db; }\n  async cloudGetUser(name){ if(!this.db) return undefined; try { const d=await this.db.collection('users').doc(name).get(); return d.exists ? (d.data()||{}) : null; } catch(e){ console.warn('cloudGetUser',e); return undefined; } }\n  async cloudSetUser(name, data){ if(!this.db) return false; try { await this.db.collection('users').doc(name).set(data,{merge:true}); return true; } catch(e){ console.warn('cloudSetUser',e); return false; } }\n  async cloudEnsureUser(name, rec){ if(!this.db||!rec) return; try { const d=await this.db.collection('users').doc(name).get(); if(!d.exists){ await this.db.collection('users').doc(name).set({ pass:rec.pass, created:rec.created||Date.now(), tgToken:rec.tgToken||'', tgChat:rec.tgChat||'' },{merge:true}); } } catch(e){ console.warn('cloudEnsureUser',e); } }\n  async syncUserFromCloud(username){\n    await this.waitDb(6000);\n    if (!this.db) return;\n    const local = this.getUsers();\n    if (local[username]) await this.cloudEnsureUser(username, local[username]); // heal legacy local-only accounts\n    const cu = await this.cloudGetUser(username);\n    if (cu && this.state.user===username) {\n      const patch = {};\n      if (cu.tgToken && cu.tgToken!==this.state.tgToken) patch.tgToken = cu.tgToken;\n      if (cu.tgChat && cu.tgChat!==this.state.tgChat) patch.tgChat = cu.tgChat;\n      if (Object.keys(patch).length) {\n        this.setState(patch);\n        try{ localStorage.setItem(this.tKey(username), JSON.stringify({ token: patch.tgToken||this.state.tgToken, chat: patch.tgChat||this.state.tgChat })); }catch(e){}\n      }\n      if (cu.pass){ local[username]={ pass:cu.pass, created:cu.created||Date.now() }; this.saveUsers(local); }\n    }\n  }\n\n  // ===== CLOUD (Firebase Firestore) — เชื่อมข้ามเครื่องแบบเรียลไทม์ =====\n  get db(){ return (typeof window!=='undefined' && window.PUMP_DB) ? window.PUMP_DB : null; }\n\n  subscribe() {\n    if (!this.db || !this.state.user) return;\n    if (this._unsub) { try { this._unsub(); } catch(e){} }\n    try {\n      this._unsub = this.db.collection('orders').where('shop','==', this.state.user)\n        .onSnapshot((snap) => {\n          const arr = snap.docs.map(d => { const x = d.data()||{}; return { id:d.id, customer:x.customer||'ไม่ระบุ', platform:x.platform, service:x.service, link:x.link||'', qty:Number(x.qty)||0, price:Number(x.price)||0, status:this.migrate(x.status), accountType:x.accountType||'ปกติปน', date:x.date, createdAt:Number(x.createdAt)||0 }; });\n          try { if (this.state.user) localStorage.setItem(this.oKey(this.state.user), JSON.stringify(arr)); } catch(e){}\n          this.setState({ orders: arr });\n        }, (err) => { console.warn('snapshot', err); });\n    } catch(e) { console.warn('subscribe', e); }\n  }\n\n  addOrder(o) {\n    if (this.db) {\n      try { this.db.collection('orders').add({ shop:this.state.user, customer:o.customer||'ไม่ระบุ', platform:o.platform, service:o.service, link:o.link||'', qty:Number(o.qty)||0, price:Number(o.price)||0, status:o.status||'รอทำ', accountType:o.accountType||'ปกติปน', date:o.date, createdAt:o.createdAt||Date.now(), source:o.source||'web' }); } catch(e){ console.warn(e); }\n    } else { this.save([...(this.state.orders||[]), { id:Date.now(), ...o }]); }\n  }\n  setStatus(o, ns) {\n    if (this.db) { try { this.db.collection('orders').doc(String(o.id)).update({ status:ns }); } catch(e){} }\n    else { this.save((this.state.orders||[]).map(x=>x.id===o.id?{...x,status:ns}:x)); }\n    if (ns==='ทำแล้ว') this.notifyClose({...o, status:ns});\n  }\n  removeOrder(o) {\n    if (this.db) { try { this.db.collection('orders').doc(String(o.id)).delete(); } catch(e){} }\n    else { this.save((this.state.orders||[]).filter(x=>x.id!==o.id)); }\n  }\n\n  enterUser(username, rec) {\n    rec = rec || {};\n    let tgToken = rec.tgToken || '', tgChat = rec.tgChat || '';\n    if (!tgToken && !tgChat) { try { const tg = JSON.parse(localStorage.getItem(this.tKey(username))); if (tg) { tgToken = tg.token || ''; tgChat = tg.chat || ''; } } catch(e){} }\n    try { localStorage.setItem('pumpdesk_session_v1', username); } catch(e){}\n    this.setState({ authed:true, user:username, tgToken, tgChat, page:'dashboard', authName:'', authPass:'', authPass2:'', authErr:'' });\n    this.syncUserFromCloud(username); // ตรวจ/อัปเดตบัญชี + ตั้งค่า Telegram จากคลาวด์\n    if (this.db) {\n      let cached = [];\n      try { cached = JSON.parse(localStorage.getItem(this.oKey(username))) || []; } catch(e){}\n      this.setState({ orders: cached.map(o=>({...o, status:this.migrate(o.status)})) });\n      setTimeout(()=>this.subscribe(), 0);\n    } else {\n      let data = null;\n      try { data = JSON.parse(localStorage.getItem(this.oKey(username))); } catch(e){}\n      if (!data) { data = this.seed(); try { localStorage.setItem(this.oKey(username), JSON.stringify(data)); } catch(e){} }\n      data = data.map(o=>({...o, status:this.migrate(o.status)}));\n      this.setState({ orders: data });\n    }\n  }\n\n  async doLogin() {\n    if (this.state.authBusy) return;\n    const name = (this.state.authName||'').trim();\n    const pass = this.state.authPass||'';\n    if (!name || !pass) return this.setState({ authErr:'กรุณากรอกชื่อผู้ใช้และรห te.copiedId===o.id) this.setState({copiedId:null}); },1300); },\n      onAdvance:()=>{ const i=this.STATUSES.indexOf(o.status); const ns=this.STATUSES[(i+1)%this.STATUSES.length]; this.setStatus(o, ns); },\n      onDelete:()=>{ this.removeOrder(o); },\n    });\n\n    const sorted = [...orders].sort((a,b)=> this.oDate(b).localeCompare(this.oDate(a)) || (Number(b.createdAt)||0)-(Number(a.createdAt)||0));\n    const recentOrders = sorted.slice(0,6).map(decorate);\n\n    // filters\n    const filterDef = [\n      {id:'all', label:'ทั้งหมด', count:orders.length},\n      {id:'รอทำ', label:'รอทำ', count:pending},\n      {id:'ทำแล้ว', label:'ทำแล้ว', count:done},\n    ];\n    const filters = filterDef.map(f=>{ const active=this.state.filter===f.id;\n      return {...f, onClick:()=>this.setState({filter:f.id}),\n        style:`padding:8px 15px; border-radius:20px; cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; border:1px solid ${active?'#7c5cff':'#232a36'}; background:${active?'#7c5cff22':'#12161e'}; color:${active?'#c4b8ff':'#8b93a3'};`};\n    });\n    const filtered = sorted.filter(o=>this.state.filter==='all'||o.status===this.state.filter);\n    const ordersView = filtered.map(decorate);\n\n    // services page\n    const serviceCards = svcArr.map(s=>({ name:s.name, platform:s.platform, count:s.count, revenue:this.fmt(s.revenue), pColor:(P[s.platform]||{}).color||'#888', pIcon:(P[s.platform]||{}).icon||'?' }));\n\n    // customers\n    const custMap = {};\n    orders.forEach(o=>{ (custMap[o.customer]=custMap[o.customer]||{name:o.customer, orders:0, spent:0, last:''}); custMap[o.customer].orders++; custMap[o.customer].spent+=Number(o.price||0); const od=this.oDate(o); if(od>custMap[o.customer].last) custMap[o.customer].last=od; });\n    const customerRows = Object.values(custMap).sort((a,b)=>b.spent-a.spent).map((c,i)=>({ name:c.name, orders:c.orders, spent:this.fmt(c.spent), last:c.last, initial:(c.name||'?').trim().charAt(0), avColor:this.AV[i%this.AV.length] }));\n\n    // ===== CHART =====\n    const ymd = (dt)=>this.ymdLocal(dt);\n    const revByDate = {};\n    orders.forEach(o=>{ const od=this.oDate(o); revByDate[od] = (revByDate[od]||0) + Number(o.price||0); });\n    const cntByDate = {};\n    orders.forEach(o=>{ const od=this.oDate(o); cntByDate[od] = (cntByDate[od]||0) + 1; });\n    const now = this.thNow();\n    const todayStr = ymd(now);\n    const yStr = ymd(new Date(now.getFullYear(), now.getMonth(), now.getDate()-1));\n    const todayRevN = revByDate[todayStr]||0;\n    const yRevN = revByDate[yStr]||0;\n    const diffN = todayRevN - yRevN;\n    const weekMode = this.state.chartMode === 'week';\n    const monthMode = this.state.chartMode === 'month';\n    const rangeMode = this.state.chartMode === 'range';\n\n    let chartBars = [], chartTotal = 0, chartCount = 0, barGap = '10px';\n    let monthLabel = '', canNext = false, rangeDays = 0;\n\n    if (weekMode) {\n      const arr = [];\n      for (let i=6;i>=0;i--){ const dt=new Date(now.getFullYear(),now.getMonth(),now.getDate()-i); arr.push({ ds:ymd(dt), day:this.THDAYS[dt.getDay()] }); }\n      const maxV = Math.max(1,...arr.map(a=>revByDate[a.ds]||0));\n      chartTotal = arr.reduce((s,a)=>s+(revByDate[a.ds]||0),0);\n      chartBars = arr.map(a=>{ const v=revByDate[a.ds]||0; const isT=a.ds===todayStr;\n        return { pct:Math.round(v/maxV*100), fill:isT?'linear-gradient(180deg,#a45cff,#7c5cff)':'linear-gradient(180deg,#3a4560,#2a3348)', axis:a.day, axisColor:isT?'#c4b8ff':'#6b7484', valueLabel:v?('฿'+this.fmt(v)):'', labelOpacity:v?1:0, title:a.ds+': ฿'+this.fmt(v) };\n      });\n      barGap = '10px';\n    } else if (monthMode) {\n      const base = new Date(now.getFullYear(), now.getMonth()+this.state.monthOffset, 1);\n      const y = base.getFullYear(), m = base.getMonth();\n      monthLabel = this.THMONTHS[m] + ' ' + (y+543);\n      canNext = this.state.monthOffset < 0;\n      const days = new Date(y, m+1, 0).getDate();\n      const arr = [];\n      for (let d=1; d<=days; d++){ const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; arr.push({ ds, d }); }\n      const maxV = Math.max(1,...arr.map(a=>revByDate[a.ds]||0));\n      chartTotal = arr.reduce((s,a)=>s+(revByDate[a.ds]||0),0);\n      chartCount = arr.reduce((s,a)=>s+(cntByDate[a.ds]||0),0);\n      chartBars = arr.map(a=>{ const v=revByDate[a.ds]||0; const isT=a.ds===todayStr; const showAxis=(a.d===1||a.d%5===0||a.d===days);\n        return { pct:Math.round(v/maxV*100), fill:isT?'linear-gradient(180deg,#a45cff,#7c5cff)':'linear-gradient(180deg,#2f6d4d,#25945f)', axis:showAxis?String(a.d):'', axisColor:isT?'#c4b8ff':'#6b7484', valueLabel:'', labelOpacity:0, title:a.ds+': ฿'+this.fmt(v) };\n      });\n      barGap = '3px';\n    } else {\n      // ===== ช่วงวันที่ (custom range) =====\n      const parse = (s)=>{ const p=(s||'').split('-'); return new Date(+p[0], +p[1]-1, +p[2]); };\n      let rf = this.state.rangeFrom || todayStr, rt = this.state.rangeTo || todayStr;\n      if (rf > rt) { const t=rf; rf=rt; rt=t; }\n      const arr = [];\n      let cur = parse(rf); const end = parse(rt); let guard = 0;\n      while (cur <= end && guard < 185) { arr.push({ ds: this.ymdLocal(cur), d: cur.getDate(), m: cur.getMonth() }); cur = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate()+1); guard++; }\n      rangeDays = arr.length;\n      const maxV = Math.max(1,...arr.map(a=>revByDate[a.ds]||0));\n      chartTotal = arr.reduce((s,a)=>s+(revByDate[a.ds]||0),0);\n      chartCount = arr.reduce((s,a)=>s+(cntByDate[a.ds]||0),0);\n      const few = arr.length <= 16;\n      chartBars = arr.map(a=>{ const v=revByDate[a.ds]||0; const isT=a.ds===todayStr; const showAxis = few || a.d===1 || a.d%5===0;\n        return { pct:Math.round(v/maxV*100), fill:isT?'linear-gradient(180deg,#a45cff,#7c5cff)':'linear-gradient(180deg,#2f6d4d,#25945f)', axis:showAxis?(a.d+'/'+(a.m+1)):'', axisColor:isT?'#c4b8ff':'#6b7484', valueLabel:(few&&v)?('฿'+this.fmt(v)):'', labelOpacity:(few&&v)?1:0, title:a.ds+': ฿'+this.fmt(v) };\n      });\n      barGap = few ? '8px' : '3px';\n    }\n\n    // form\n    const f = this.state.form;\n    const svcOpts = this.SERVICES[f.platform] || [];\n    const setField = (k)=>(e)=>this.setState({form:{...this.state.form,[k]:e.target.value}});\n    const setPlatform = (e)=>{ const pv=e.target.value; this.setState({form:{...this.state.form, platform:pv, service:(this.SERVICES[pv]||[''])[0]}}); };\n    const submit = ()=>{ const fm=this.state.form; if(!fm.customer.trim()) return; const no={ customer:fm.customer.trim(), platform:fm.platform, service:fm.service||svcOpts[0]||'', link:fm.link, qty:Number(fm.qty)||0, price:Number(fm.price)||0, status:'รอทำ', accountType:fm.accountType||'ปกติปน', date:this.ymdLocal(), createdAt:Date.now(), source:'web' }; this.addOrder(no); this.setState({showForm:false, page:'orders', filter:'all', form:{customer:'',platform:'Facebook',service:'',link:'',qty:'',price:'',accountType:'ปกติปน'}}); };\n    const openForm = ()=>this.setState({showForm:true, form:{customer:'',platform:'Facebook',service:(this.SERVICES['Facebook']||[''])[0],link:'',qty:'',price:'',accountType:'ปกติปน'}});\n    const ACT = [ {v:'ปกติปน', label:'ปกติ/ปน', icon:'🌐'}, {v:'คนไทย', label:'คนไทย', icon:'🇹🇭'} ];\n    const accountTypeOpts = ACT.map(a=>{ const active=(this.state.form.accountType||'ปกติปน')===a.v;\n      return { label:a.label, icon:a.icon, onClick:()=>this.setState({form:{...this.state.form, accountType:a.v}}),\n        style:`flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:11px; border-radius:11px; cursor:pointer; font-family:inherit; font-size:13.5px; font-weight:600; color:${active?'#c4b8ff':'#8b93a3'}; background:${active?'#7c5cff22':'#0d1017'}; border:1.5px solid ${active?'#7c5cff':'#262d3a'};` };\n    });\n\n    const titles = { dashboard:['แดชบอร์ด','ภาพรวมยอดขายและงานทั้งหมด'], orders:['ออเดอร์','จัดการและติดตามสถานะออเดอร์'], services:['บ State({monthOffset:this.state.monthOffset+1}); },\n      nextColor: canNext?'#c4b8ff':'#3a4150', nextBorder: canNext?'#232a36':'#1a1f28', nextCursor: canNext?'pointer':'not-allowed',\n      setWeekMode:()=>this.setState({chartMode:'week'}),\n      setMonthMode:()=>this.setState({chartMode:'month', monthOffset:0}),\n      weekTabStyle:`padding:6px 14px; border-radius:8px; border:none; cursor:pointer; font-family:inherit; font-size:12.5px; font-weight:600; background:${weekMode?'#7c5cff':'transparent'}; color:${weekMode?'#fff':'#8b93a3'};`,\n      monthTabStyle:`padding:6px 14px; border-radius:8px; border:none; cursor:pointer; font-family:inherit; font-size:12.5px; font-weight:600; background:${monthMode?'#7c5cff':'transparent'}; color:${monthMode?'#fff':'#8b93a3'};`,\n      tgConnected: !!(this.state.tgChat && this.state.tgToken),\n      tgBtnLabel: (this.state.tgChat && this.state.tgToken) ? 'เชื่อมแล้ว' : 'เชื่อม Telegram',\n      tgBtnColor: (this.state.tgChat && this.state.tgToken) ? '#4ee39a' : '#8b93a3',\n      tgBtnBorder: (this.state.tgChat && this.state.tgToken) ? '#1e5c3a' : '#232a36',\n      // auth\n      authed: this.state.authed, notAuthed: !this.state.authed,\n      user: this.state.user, userInitial: (this.state.user||'?').trim().charAt(0).toUpperCase(),\n      logout: () => this.logout(),\n      isRegister: this.state.authTab === 'register',\n      authName: this.state.authName, authPass: this.state.authPass, authPass2: this.state.authPass2,\n      setAuthName: (e)=>this.setState({authName:e.target.value, authErr:''}),\n      setAuthPass: (e)=>this.setState({authPass:e.target.value, authErr:''}),\n      setAuthPass2: (e)=>this.setState({authPass2:e.target.value, authErr:''}),\n      setLoginTab: ()=>this.setState({authTab:'login', authErr:''}),\n      setRegisterTab: ()=>this.setState({authTab:'register', authErr:''}),\n      authSubmit: this.state.authTab === 'register' ? (()=>this.doRegister()) : (()=>this.doLogin()),\n      onAuthKey: (e)=>{ if(e.
